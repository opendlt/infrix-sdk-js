name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Cross-repo goal-type parity: the committed TS + AS IntentGoalType regions
  # must match the published infrix-schema vocabulary. Fails on drift.
  sdkgen-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
      - run: go test ./... -count=1
        working-directory: tools/sdkgen

  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: packages
      - run: npm test
        working-directory: packages
